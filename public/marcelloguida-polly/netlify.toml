[build]
  publish = "."

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/support"
  to = "/supportPolly.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacyPolly.html"
  status = 200

[[redirects]]
  from = "/data-management"
  to = "/data-managementPolly.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404Polly.html"
  status = 404
